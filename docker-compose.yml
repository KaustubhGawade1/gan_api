version: '3.8'

services:
  gan-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gan-backend-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DEVICE=cuda
      - CLIP_MODEL_NAME=openai/clip-vit-base-patch32
      - IMAGE_SIZE=256
      - JPEG_QUALITY=95
    volumes:
      - ./weights:/app/weights
      - ./app:/app/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  weights:
    driver: local
